<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso · Control de Operarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-badge">
      <span class="login-badge-code">OP·CTRL</span>
    </div>
    <h1 class="login-title">Control de Operarios</h1>
    <p class="login-sub">Accede al panel para gestionar pagos, cobros y personal.</p>

    <form id="form-login" class="login-form">
      <label class="field">
        <span>Email</span>
        <input type="email" id="email" name="email" autocomplete="username" required>
      </label>
      <label class="field">
        <span>Contraseña</span>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </label>
      <p id="login-error" class="form-error" hidden></p>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script>
    if (Api.getToken()) window.location.href = 'index.html';

    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('login-error');
      errorEl.hidden = true;

      try {
        const data = await Api.login(email, password);
        Api.setToken(data.token);
        Api.setUser({ nombre: data.nombre, email: data.email });
        window.location.href = 'index.html';
      } catch (err) {
        errorEl.textContent = err.message || 'No se ha podido iniciar sesión.';
        errorEl.hidden = false;
      }
    });
  </script>
</body>
</html>
